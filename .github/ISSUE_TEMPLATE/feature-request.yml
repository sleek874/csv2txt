name: Feature request
description: Propose a scoped improvement to the converter.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Project constraints
      options:
        - label: The proposal can run entirely in the browser.
          required: true
        - label: The proposal does not require uploading source data.
          required: true
        - label: I have not included sensitive data in this issue.
          required: true
